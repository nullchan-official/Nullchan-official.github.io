<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0chan - Anonymous Feed</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f4f4f5;
            --border: #e4e4e7;
            --text: #18181b;
            --text-muted: #71717a;
            --accent: #a78bfa;
            --error: #ef4444;
        }

        [data-theme="dark"] {
            --bg: #0f0f12;
            --surface: #18181c;
            --border: #2d2d34;
            --text: #e2e8f0;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; transition: background 0.2s, color 0.2s; }
        
        .chat-container { width: 100%; max-width: 500px; background: #f4f4f5; border: 1px solid #e4e4e7; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; height: 600px; color: #18181b; }
        [data-theme="dark"] .chat-container { background: #18181c; border-color: #2d2d34; color: #e2e8f0; }

        .chat-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-header h2 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; }
        
        .theme-toggle { background: none; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 500; }
        .theme-toggle:hover { background: var(--bg); }

        .message-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; }
        
        .msg { background: var(--bg); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); word-break: break-word; position: relative; }
        .msg .meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; text-align: right; }
        
        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; color: var(--text); font-size: 0.95rem; outline: none; }
        input:focus { border-color: var(--accent); }
        input:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .error-toast { color: var(--error); font-size: 0.85rem; min-height: 18px; text-align: center; font-weight: 500; }
        .mobile-blocker { display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; font-weight: 600; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="chat-container" id="appContainer">
        <div class="chat-header">
            <div>
                <h2>0chan</h2>
                <button class="theme-toggle" id="themeBtn" style="margin-top: 8px;">Dark Mode</button>
            </div>
            <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px;">
                <div style="display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 500;">
                    <span style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #22c55e;"></span>
                    <span id="onlineCount">Connecting...</span>
                </div>
            </div>
        </div>
        
        <div class="message-box" id="messageBox"></div>

        <div class="input-area">
            <div class="error-toast" id="errorToast"></div>
            <input type="text" id="msgInput" placeholder="Type a message and hit Enter..." maxlength="250" autocomplete="off">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script>
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        if (isMobile) {
            document.getElementById('appContainer').outerHTML = '<div class="mobile-blocker" style="display: flex;">The site is not compatible with mobile yet :/ sorry</div>';
            throw new Error("Execution halted."); 
        }

        const messageBox = document.getElementById('messageBox');
        const msgInput = document.getElementById('msgInput');
        const errorToast = document.getElementById('errorToast');
        const themeBtn = document.getElementById('themeBtn');

        let userToken = localStorage.getItem('user_token') || 'usr_' + Math.random().toString(36).substring(2, 15);
        localStorage.setItem('user_token', userToken);

        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
            clientId: userToken + '_' + Math.floor(Math.random() * 1000),
            connectTimeout: 5000,
            reconnectPeriod: 2000
        });

        const CHAT_TOPIC = 'io/0chan/public/global_feed_v1';
        const STATUS_TOPIC = 'io/0chan/public/presence_v1';

        // Read or build empty structural feed logs locally
        let globalMessages = JSON.parse(sessionStorage.getItem('0chan_feed_history')) || [];
        let activePeers = {}; 

        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.hasAttribute('data-theme');
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.innerText = 'Dark Mode';
                localStorage.setItem('theme_preference', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.innerText = 'Light Mode';
                localStorage.setItem('theme_preference', 'dark');
            }
        });

        client.on('connect', () => {
            client.subscribe([CHAT_TOPIC, STATUS_TOPIC]);
            document.getElementById('onlineCount').innerText = "Live";
            errorToast.innerText = "";
            setInterval(() => {
                client.publish(STATUS_TOPIC, JSON.stringify({ user: userToken, ping: Date.now() }));
            }, 4000);
        });

        client.on('message', (topic, payload) => {
            try {
                const incomingData = JSON.parse(payload.toString());
                
                if (topic === STATUS_TOPIC) {
                    activePeers[incomingData.user] = Date.now();
                    const cutoff = Date.now() - 10000;
                    let count = 0;
                    for (const u in activePeers) { if (activePeers[u] > cutoff) count++; }
                    document.getElementById('onlineCount').innerText = `${Math.max(1, count)} online`;
                    return;
                }

                // If receiving a compiled block payload list from history sync pipelines
                if (Array.isArray(incomingData)) {
                    incomingData.forEach(m => {
                        if (!globalMessages.some(existing => existing.id === m.id)) {
                            globalMessages.push(m);
                        }
                    });
                    globalMessages.sort((a, b) => a.timestamp - b.timestamp);
                    if (globalMessages.length > 25) globalMessages = globalMessages.slice(-25);
                    sessionStorage.setItem('0chan_feed_history', JSON.stringify(globalMessages));
                    renderMessages(globalMessages);
                    return;
                }

                if (incomingData.text === 'OVERRIDE_PURGE_EXECUTE') {
                    globalMessages = [];
                    sessionStorage.removeItem('0chan_feed_history');
                    renderMessages([]);
                    return;
                }

                if (!globalMessages.some(m => m.id === incomingData.id)) {
                    globalMessages.push(incomingData);
                    if (globalMessages.length > 25) globalMessages = globalMessages.slice(-25);
                    sessionStorage.setItem('0chan_feed_history', JSON.stringify(globalMessages));
                    
                    // Maintain state across arrivals by caching the current history array directly on the broker
                    client.publish(CHAT_TOPIC, JSON.stringify(globalMessages), { retain: true, qos: 1 });
                    renderMessages(globalMessages);
                }
            } catch(e) {}
        });

        function renderMessages(msgs) {
            messageBox.innerHTML = '';
            msgs.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<div>${escapeHTML(msg.text)}</div><div class="meta">${escapeHTML(msg.time)}</div>`;
                messageBox.appendChild(div);
            });
            messageBox.scrollTop = messageBox.scrollHeight;
        }

        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = msgInput.value.trim();
                if (!text) return;
                
                const newMsg = {
                    id: userToken + '_' + Date.now(),
                    timestamp: Date.now(),
                    text: text,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                client.publish(CHAT_TOPIC, JSON.stringify(newMsg));
                msgInput.value = '';
            }
        });

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t]));
        }

        renderMessages(globalMessages);
    </script>
</body>
</html>
